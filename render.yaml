envVarGroups:
  - name: mindsystem-runtime
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        value: personal-context-os
      - key: S3_REGION
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        value: replace-with-google-oauth-client-id
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        value: replace-with-google-oauth-client-secret
      - key: GOOGLE_CALENDAR_TOKEN_ENCRYPTION_KEY
        value: replace-with-base64-32-byte-token-encryption-key
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_AUTH_MODE
        value: api_key
      - key: OPENAI_API_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_EXTRACTION_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OPENAI_CODEX_BASE_URL
        value: https://chatgpt.com/backend-api/codex
      - key: OPENAI_CODEX_EXTRACTION_MODEL
        value: gpt-5.5
      - key: OPENAI_CODEX_RETRIEVAL_MODEL
        value: gpt-5.5
      - key: OPENAI_CODEX_ACCESS_TOKEN
        sync: false
      - key: OPENAI_CODEX_REFRESH_TOKEN
        sync: false
      - key: OPENAI_CODEX_ACCOUNT_ID
        sync: false
      - key: OPENAI_CODEX_TOKEN_EXPIRES_AT
        sync: false
      - key: OPENAI_CODEX_TOKEN_ENCRYPTION_KEY
        sync: false

services:
  - type: keyvalue
    name: mindsystem-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: mindsystem-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: pnpm render:start:api
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: mindsystem-postgres
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: mindsystem-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: mindsystem-redis
          property: port
      - key: APP_BASE_URL
        value: https://razbitton.com
      - key: API_BASE_URL
        value: https://mindsystem-api.onrender.com
      - key: MCP_SERVER_URL
        value: https://mindsystem-api.onrender.com/mcp
      - key: BOOTSTRAP_USER_EMAIL
        sync: false
      - key: BOOTSTRAP_USER_NAME
        value: Render User
      - key: BOOTSTRAP_USER_PASSWORD
        sync: false
      - fromGroup: mindsystem-runtime

  - type: web
    name: mindsystem-web
    runtime: docker
    plan: starter
    domains:
      - razbitton.com
    renderSubdomainPolicy: disabled
    dockerfilePath: ./Dockerfile
    dockerCommand: pnpm render:start:web
    healthCheckPath: /login
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 10000
      - key: API_BASE_URL
        value: https://mindsystem-api.onrender.com

  - type: worker
    name: mindsystem-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: pnpm render:start:worker
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mindsystem-postgres
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: mindsystem-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: mindsystem-redis
          property: port
      - key: APP_BASE_URL
        value: https://razbitton.com
      - key: API_BASE_URL
        value: https://mindsystem-api.onrender.com
      - key: MCP_SERVER_URL
        value: https://mindsystem-api.onrender.com/mcp
      - fromGroup: mindsystem-runtime

databases:
  - name: mindsystem-postgres
    databaseName: mindsystem
    user: mindsystem
    plan: free
